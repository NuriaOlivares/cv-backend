spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    open-in-view: false

app:
  admin:
    password: ${ADMIN_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.nuria: INFO

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false