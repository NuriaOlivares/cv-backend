server:
  port: 8080

spring:
  application:
    name: cvplatform
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      indent-output: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    emailTo: ${GMAIL_TO}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  expiration: 900000

groq:
  api-key: ${GROQ_API_KEY}
  model: llama-3.3-70b-versatile
  api-url: https://api.groq.com/openai/v1/chat/completions