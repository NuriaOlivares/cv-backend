name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: cv_platform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: dev
          DB_PASSWORD: postgres
          ADMIN_PASSWORD: test_admin_password
          JWT_SECRET: test_secret_key_min_32_chars_long_here
          GROQ_API_KEY: dummy_key_for_tests
        run: mvn clean verify

      - name: Build Docker image
        run: docker build -t cvplatform .